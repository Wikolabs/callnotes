version: "3.9"

# CallNotes demo — production-ready POC.
# 2 services orchestrated:
#   - callnotes (Next.js frontend on host port 3011)
#   - callnotes-backend (FastAPI Python, internal only on 8000)
# Internal network so the frontend can reach the backend by service name.

services:
  callnotes-backend:
    image: ghcr.io/wikolabs/callnotes-backend:latest
    container_name: callnotes-backend
    restart: unless-stopped
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    networks:
      - callnotes-net

  callnotes:
    image: ghcr.io/wikolabs/callnotes:latest
    container_name: callnotes
    restart: unless-stopped
    ports:
      - "3011:3000"
    environment:
      BACKEND_URL: "http://callnotes-backend:8000"
    depends_on:
      - callnotes-backend
    networks:
      - callnotes-net

networks:
  callnotes-net:
    name: callnotes-net
    driver: bridge
